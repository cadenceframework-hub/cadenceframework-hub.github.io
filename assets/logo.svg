<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0a"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#grid)"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.35"/>
  <rect x="8" y="8" width="384" height="384" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Orange accent line above -->
  <rect x="140" y="152" width="120" height="2" fill="#ff6600" rx="1" opacity="0.7"/>

  <!-- CADENCE — orange, large -->
  <text
    x="200"
    y="218"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="700"
    text-anchor="middle"
    fill="#ff6600"
    letter-spacing="-1">CADENCE</text>

  <!-- FRAMEWORK — white -->
  <text
    x="200"
    y="263"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="400"
    text-anchor="middle"
    fill="#f0f0f0"
    letter-spacing="3">FRAMEWORK</text>

  <!-- Orange accent line below -->
  <rect x="140" y="278" width="120" height="2" fill="#ff6600" rx="1" opacity="0.4"/>
</svg>
